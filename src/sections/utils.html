<!-- MODAL DE MÚSICA -->
<div id="musicModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="close-music-modal">&times;</span>
        <h2>Sugerir Canción</h2>
        <p>¿Qué música no puede faltar en nuestra fiesta?</p>
        <form id="musicForm">
            <input type="text" id="mGuest" placeholder="Tu nombre" required>
            <input type="text" id="mSong" placeholder="Nombre de la canción" required>
            <input type="text" id="mArtist" placeholder="Artista / Autor" required>
            <button type="submit" class="btn">Enviar sugerencia</button>
        </form>
    </div>
</div>

<!-- INDICADOR DE SCROLL GLOBAL -->
<div id="scroll-hint">
    <span></span>
</div>
